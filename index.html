<body>

    </div>
    </form>

            let password = document.getElementById("Password").value;

            let check = document.getElementById("checkboxID").checked;

            switch (check) {
                case true:
                    break;
                case false:
                    break;
            }

            let correctUsername = "imsosigma67";
            let correctPassword = "s1gm4wafflez";

            if (!username || !password) {
                alert("Please fill in both fields.");
                return false;
            }
             if (username === correctUsername && password === correctPassword) {
